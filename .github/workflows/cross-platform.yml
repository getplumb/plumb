name: Cross-Platform Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run before publishing to catch issues early
  workflow_dispatch:
    inputs:
      run_install_smoke:
        description: 'Run full pack+install smoke test'
        type: boolean
        default: false

# -------------------------------------------------------------------
# STRATEGY
#
# Three layers of testing, cheapest-to-run first:
#
# 1. build-and-unit  — build the monorepo + run vitest on every
#    OS × Node combo. Catches: native addon (better-sqlite3) compile
#    failures, path separator bugs, ESM/CJS issues.
#
# 2. install-smoke   — `npm pack` the plugin, install it into a
#    fresh temp dir, exercise plumb_remember + plumb_search directly
#    (no openclaw process needed). Catches: postinstall failures,
#    bundled dep issues, runtime import errors.
#
# 3. (future) openclaw-e2e — full openclaw + plumb install flow.
#    Needs a --headless/--ci openclaw flag. Marked TODO below.
# -------------------------------------------------------------------

jobs:
  # ----------------------------------------------------------------
  # Job 1: Build + unit tests
  # ----------------------------------------------------------------
  build-and-unit:
    name: Build & Unit (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false   # see all failures, not just the first
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['18', '20', '22']

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version read from packageManager field in package.json (pnpm@10.30.3)

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Run unit tests
        run: pnpm test
        env:
          # Vitest needs this on Windows to avoid interactive TTY issues
          CI: true

  # ----------------------------------------------------------------
  # Job 2: Pack + install smoke test
  # Simulates what a real user does: npm install @getplumb/plumb
  # ----------------------------------------------------------------
  install-smoke:
    name: Install Smoke (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    # Run on push to main, PRs, or manual trigger with flag set
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_install_smoke)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['18', '20', '22']
        # Reduce matrix size slightly — spot-check node 20 on all OS,
        # full matrix on ubuntu only
        exclude:
          - os: windows-latest
            node: '18'
          - os: macos-latest
            node: '18'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version read from packageManager field in package.json (pnpm@10.30.3)

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install deps + build plugin
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @getplumb/core build
          pnpm --filter @getplumb/plumb build

      - name: Pack plugin tarball
        shell: bash
        working-directory: packages/openclaw-plugin
        run: |
          # pnpm pack (not npm pack) — rewrites workspace:* deps to real versions
          pnpm pack
          # Move tarball to a known location with a fixed name
          mv getplumb-plumb-*.tgz $GITHUB_WORKSPACE/plumb-plugin.tgz

      - name: Install into fresh directory (simulate real user install)
        shell: bash
        run: |
          mkdir -p /tmp/plumb-smoke-test
          cd /tmp/plumb-smoke-test
          npm init -y
          # Install from the local pack (swap for @getplumb/plumb on real publish)
          npm install $GITHUB_WORKSPACE/plumb-plugin.tgz

      - name: Run smoke test
        shell: bash
        run: node $GITHUB_WORKSPACE/.github/scripts/smoke-test.mjs
        env:
          PLUMB_SMOKE_DIR: /tmp/plumb-smoke-test
          PLUMB_DB_PATH: /tmp/plumb-smoke-test/.plumb-test/memory.db

  # ----------------------------------------------------------------
  # Job 3: Full openclaw E2E
  # Starts a real openclaw gateway, installs the plugin, verifies it
  # loads without crashing and registers its tools. Ubuntu-only for now.
  # ----------------------------------------------------------------
  openclaw-e2e:
    name: OpenClaw E2E (ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install openclaw globally
        run: npm install -g openclaw

      - name: Install deps + build plugin
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @getplumb/core build
          pnpm --filter @getplumb/plumb build

      - name: Pack plugin tarball
        shell: bash
        working-directory: packages/openclaw-plugin
        run: |
          pnpm pack
          mv getplumb-plumb-*.tgz $GITHUB_WORKSPACE/plumb-plugin.tgz

      - name: Seed minimal openclaw config
        run: |
          mkdir -p ~/.openclaw
          cat > ~/.openclaw/openclaw.json << 'EOF'
          {
            "meta": { "version": 1 },
            "gateway": {
              "mode": "local",
              "port": 18799,
              "bind": "loopback",
              "auth": { "mode": "none" }
            }
          }
          EOF

      - name: Install plumb plugin (filesystem only, no gateway yet)
        run: openclaw plugins install $GITHUB_WORKSPACE/plumb-plugin.tgz

      - name: Start gateway in background
        run: |
          nohup openclaw gateway run > /tmp/openclaw-gw.log 2>&1 &
          echo $! > /tmp/openclaw-gw.pid
          echo "Gateway PID: $(cat /tmp/openclaw-gw.pid)"

      - name: Wait for gateway /health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:18799/health | grep -q '"ok":true'; then
              echo "Gateway is live!"
              exit 0
            fi
            echo "Attempt $i — waiting..."
            sleep 1
          done
          echo "=== Gateway failed to start. Log: ==="
          cat /tmp/openclaw-gw.log
          exit 1

      - name: Run E2E assertions
        run: node $GITHUB_WORKSPACE/.github/scripts/e2e-test.mjs
        env:
          OPENCLAW_PORT: 18799

      - name: Upload gateway log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-gateway-log
          path: /tmp/openclaw-gw.log

      - name: Stop gateway
        if: always()
        run: kill $(cat /tmp/openclaw-gw.pid) 2>/dev/null || true
