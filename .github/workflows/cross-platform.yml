  #   name: OpenClaw E2E (${{ matrix.os }})
  #   runs-on: ${{ matrix.os }}
  #   strategy:
  #     matrix:
  #       os: [ubuntu-latest, windows-latest, macos-latest]
  #   steps:
  #     - name: Install openclaw
  #       run: npm install -g openclaw
  #     - name: Init gateway (headless)
  #       run: openclaw gateway install --ci --no-interactive
  #     - name: Install plumb plugin
  #       run: openclaw plugins install @getplumb/plumb
